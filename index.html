<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魔法のトーストタイマー (最終診断版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@900&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; background: #fffaf2; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 40px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 380px; border: 6px solid #ffedda; text-align: center; }
        .timer-bg { background: linear-gradient(135deg, #f97316, #ef4444); border-radius: 30px; padding: 35px 10px; color: white; margin-bottom: 20px; }
        .btn-magic { background: #ea580c; color: white; border-radius: 18px; padding: 14px; font-weight: 900; width: 100%; box-shadow: 0 4px 0 #9a3412; cursor: pointer; border: none; }
        .btn-magic:active { transform: translateY(2px); box-shadow: 0 2px 0 #9a3412; }
        input { border: 3px solid #ffedda; border-radius: 12px; padding: 10px; width: 100%; text-align: center; margin-bottom: 10px; outline: none; }
        #log { color: #ef4444; font-size: 11px; margin-top: 10px; background: #fee2e2; padding: 10px; border-radius: 10px; display: none; text-align: left; white-space: pre-wrap; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h1 class="text-xl font-black text-orange-600 mb-4">🍞 魔法のタイマー</h1>
        <p class="text-[10px] text-gray-500 mb-4">Pythonで動くキーなら、必ず繋がるルートを探します</p>
        <input type="password" id="key" placeholder="APIキーを入力">
        <div id="log"></div>
        <button id="sBtn" onclick="check()" class="btn-magic mt-2">接続テスト開始！</button>
    </div>
    <div id="main" class="card hidden">
        <div class="timer-bg">
            <div id="disp" class="text-7xl font-black">03:00</div>
        </div>
        <p class="text-green-600 font-bold mb-4">✨ 接続に成功しました！</p>
        <button id="aiBtn" onclick="ask()" class="btn-magic text-sm">AIにトーストの温度を聞く ✨</button>
        <p id="successInfo" class="text-[9px] text-gray-400 mt-4"></p>
    </div>
    <script>
        let k = "";
        let workingUrl = "";

        async function check() {
            const val = document.getElementById('key').value.trim();
            const log = document.getElementById('log');
            const btn = document.getElementById('sBtn');
            if(!val) return;

            btn.disabled = true;
            log.style.display = "block";
            log.style.color = "orange";
            log.innerText = "診断中...";

            // 接続可能なすべてのパターンをテスト
            const tests = [
                { ver: "v1", mod: "gemini-1.5-flash" },
                { ver: "v1beta", mod: "gemini-1.5-flash" },
                { ver: "v1beta", mod: "gemini-1.5-flash-latest" }
            ];

            let errors = [];

            for (let t of tests) {
                const url = `https://generativelanguage.googleapis.com/${t.ver}/models/${t.mod}:generateContent?key=${val}`;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        k = val;
                        workingUrl = url;
                        document.getElementById('login').className = "hidden";
                        document.getElementById('main').className = "card";
                        document.getElementById('successInfo').innerText = "成功ルート: " + t.ver + " / " + t.mod;
                        return;
                    } else {
                        errors.push(`【${t.ver}】${data.error.message}`);
                    }
                } catch (e) {
                    errors.push(`【${t.ver}】通信エラー`);
                }
            }

            log.style.color = "#ef4444";
            log.innerText = "❌ 全ルート失敗\n" + errors.join("\n");
            btn.disabled = false;
        }

        async function ask() {
            const btn = document.getElementById('aiBtn');
            btn.disabled = true;
            try {
                const res = await fetch(workingUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "トーストを焼く温度を数字1つで答えて" }] }] })
                });
                const data = await res.json();
                alert("AIの回答: " + data.candidates[0].content.parts[0].text + "度");
            } catch(e) {
                alert("エラーが発生しました");
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
