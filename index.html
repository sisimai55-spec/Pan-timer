<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魔法のトーストタイマー・完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');
        body { font-family: 'Zen Maru Gothic', sans-serif; background: #fffaf2; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 40px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 480px; border: 8px solid #ffedda; }
        .timer-bg { background: linear-gradient(135deg, #f97316, #ef4444); border-radius: 30px; padding: 20px; color: white; margin-bottom: 20px; text-align: center; }
        .btn-magic { background: #ea580c; color: white; border-radius: 12px; padding: 10px; font-weight: 900; width: 100%; box-shadow: 0 4px 0 #9a3412; cursor: pointer; transition: 0.2s; }
        .btn-magic:active { transform: translateY(2px); box-shadow: 0 2px 0 #9a3412; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .manual-panel { background: #fdf2f2; border-radius: 20px; padding: 15px; margin-top: 15px; border: 2px solid #fee2e2; }
        select, input[type="text"] { border: 2px solid #ffedda; border-radius: 10px; padding: 8px; width: 100%; text-align: center; outline: none; background: white; }
        .info-box { background: #fffaf2; border: 2px dashed #ffedda; border-radius: 15px; padding: 12px; font-size: 13px; min-height: 50px; display: flex; align-items: center; justify-content: center; text-align: center; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login" class="card text-center">
        <h1 class="text-2xl font-black text-orange-600 mb-6">🍞 魔法のタイマー</h1>
        <input type="password" id="key" placeholder="APIキーを入力" class="mb-4">
        <button onclick="checkKey()" class="btn-magic">スタート！</button>
    </div>

    <div id="main" class="card hidden">
        <div class="timer-bg">
            <div id="disp" class="text-7xl font-black">03:00</div>
            <p id="status" class="text-xs mt-2 font-bold opacity-90">パンをセットしてください</p>
        </div>

        <input type="text" id="bread" placeholder="例：食パン、バゲット">
        
        <!-- 手動調整パネル -->
        <div class="manual-panel space-y-3">
            <div class="flex justify-between items-center gap-2">
                <span class="text-xs font-bold text-red-400">枚切数</span>
                <select id="slices" onchange="manualAdj()">
                    <option value="4">4枚切り (厚手)</option>
                    <option value="5">5枚切り (標準)</option>
                    <option value="6" selected>6枚切り (標準)</option>
                    <option value="8">8枚切り (薄手)</option>
                    <option value="1">その他 (1枚分)</option>
                </select>
            </div>
            <div class="flex justify-between items-center gap-2">
                <span class="text-xs font-bold text-red-400">温度(℃)</span>
                <div class="flex items-center gap-2">
                    <button onclick="adjTemp(-10)" class="px-3 bg-white border border-red-200 rounded-lg">-</button>
                    <span id="tempVal" class="font-bold w-10 text-center">200</span>
                    <button onclick="adjTemp(10)" class="px-3 bg-white border border-red-200 rounded-lg">+</button>
                </div>
            </div>
        </div>

        <div class="grid-btns">
            <button onclick="getAI('auto')" class="btn-magic text-xs">🕒 AI自動設定</button>
            <button onclick="getAI('tips')" class="btn-magic text-xs bg-orange-500">💡 コツ</button>
            <button onclick="getAI('drink')" class="btn-magic text-xs bg-blue-500 shadow-[0_4px_0_#1e40af]">☕ 飲み物</button>
            <button onclick="getAI('trivia')" class="btn-magic text-xs bg-green-600 shadow-[0_4px_0_#14532d]">🔊 豆知識</button>
        </div>

        <div class="info-box">
            <p id="infoText" class="text-gray-700 font-bold">手動調整もAIおまかせも自由自在！</p>
        </div>
    </div>
    <script>
        let apiKey = "";
        let currentT = 200;
        let timerSec = 180;
        const MODEL = "gemini-2.5-flash"; 

        async function checkKey() {
            const val = document.getElementById('key').value.trim();
            if(!val) return;
            apiKey = val;
            document.getElementById('login').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        // 手動で温度を調整
        function adjTemp(v) {
            currentT = Math.max(100, Math.min(250, currentT + v));
            document.getElementById('tempVal').innerText = currentT;
            manualAdj();
        }

        // 手動設定（枚切数と温度から時間を計算）
        function manualAdj() {
            const slice = parseInt(document.getElementById('slices').value);
            // 厚いほど（枚数が少ないほど）長く焼く
            let baseSec = 180; 
            if(slice == 4) baseSec = 240;
            if(slice == 5) baseSec = 210;
            if(slice == 6) baseSec = 180;
            if(slice == 8) baseSec = 150;

            // 温度による補正 (200度を基準)
            timerSec = Math.round(baseSec * (200 / currentT));
            updateDisp();
        }

        async function getAI(mode) {
            const bread = document.getElementById('bread').value || "トースト";
            const infoText = document.getElementById('infoText');
            
            infoText.innerText = "考え中...";
            
            let prompt = "";
            if(mode === 'auto') prompt = `「${bread}」を焼くのに最適な温度(℃)を数値のみ1つ。`;
            if(mode === 'tips') prompt = `「${bread}」を美味しく焼くコツを20文字以内。`;
            if(mode === 'drink') prompt = `「${bread}」に合う飲み物を1つ。`;
            if(mode === 'trivia') prompt = `「${bread}」の豆知識を、声に出して読んでちょうど「${timerSec}秒」かかる長さで。`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                const data = await res.json();
                const result = data.candidates[0].content.parts[0].text.trim();

                if(mode === 'auto') {
                    currentT = parseInt(result.match(/\d+/)) || 200;
                    document.getElementById('tempVal').innerText = currentT;
                    manualAdj(); // 自動で得た温度をもとに時間を再計算
                    infoText.innerText = `AIが${currentT}度に設定しました！`;
                } else if(mode === 'trivia') {
                    infoText.innerText = "🔊 豆知識を読み上げ中...";
                    speak(result);
                } else {
                    infoText.innerText = result;
                }
            } catch (e) { infoText.innerText = "エラー：もう一度試してね"; }
        }

        function updateDisp() {
            document.getElementById('disp').innerText = `${String(Math.floor(timerSec/60)).padStart(2,'0')}:${String(timerSec%60).padStart(2,'0')}`;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            document.getElementById('infoText').innerText = text;
            window.speechSynthesis.speak(uttr);
        }
    </script>
</body>
</html>
