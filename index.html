<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>魔法のタイマー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fffaf2; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; border: 5px solid #ffedda; text-align: center; }
        .hidden { display: none; }
        #errorLog { color: #ef4444; font-size: 11px; background: #fee2e2; padding: 10px; border-radius: 10px; margin-top: 10px; display: none; text-align: left; word-break: break-all; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h1 class="text-xl font-bold text-orange-600 mb-4">🍞 魔法のタイマー</h1>
        <p class="text-xs mb-2">APIキーを入力してください</p>
        <input type="password" id="keyInput" placeholder="AIza...で始まるキー" class="border p-2 w-full rounded mb-2 text-center">
        <div id="errorLog"></div>
        <button id="btn" onclick="check()" class="bg-orange-600 text-white p-3 w-full rounded-xl font-bold mt-2">スタート！</button>
    </div>
    <div id="main" class="card hidden">
        <div class="bg-orange-500 text-white rounded-2xl p-6 mb-4">
            <div id="time" class="text-6xl font-bold">03:00</div>
        </div>
        <p class="text-sm text-green-600 font-bold mt-4">✨ つながりました！</p>
        <p id="usedModel" class="text-[9px] text-gray-400 mt-2"></p>
    </div>
<script>
        async function check() {
            const key = document.getElementById('keyInput').value.trim();
            const log = document.getElementById('errorLog');
            const btn = document.getElementById('btn');
            
            if(!key) { log.innerText = "キーを入力してください"; log.style.display="block"; return; }
            
            log.style.display = "block";
            log.style.color = "orange";
            log.innerText = "使えるAIを探しています...";
            btn.disabled = true;

            // 試すモデルの名前リスト
            const models = [
                "gemini-1.5-flash",
                "gemini-1.5-flash-8b",
                "gemini-2.0-flash-exp",
                "gemini-1.0-pro"
            ];

            let success = false;
            for (let modelName of models) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
                    });

                    if (res.ok) {
                        document.getElementById('login').className = "hidden";
                        document.getElementById('main').className = "card";
                        document.getElementById('usedModel').innerText = "使用中: " + modelName;
                        success = true;
                        break; 
                    }
                } catch (e) { continue; }
            }

            if (!success) {
                log.style.color = "#ef4444";
                log.innerHTML = `<b>エラー: AIが見つかりません</b><br>
                                キーは正しいようですが、この環境で動くAIの名前が見つかりませんでした。`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
